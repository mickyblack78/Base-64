<!DOCTYPE html>
<html>
<body style="background:#222; color:#0f0; font-family:monospace; padding:20px;">
    <h3>IMG TO BASE64 CONVERTER</h3>
    <input type="file" id="imgInput" accept="image/*" style="margin-bottom:20px;">
    <br>
    <textarea id="output" style="width:100%; height:300px; background:#000; color:#0f0; border:1px solid #0f0;" placeholder="Base64 string will appear here..."></textarea>
    
    <script>
        document.getElementById('imgInput').addEventListener('change', function() {
            const file = this.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('output').value = reader.result;
            }
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
